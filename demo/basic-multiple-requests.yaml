# Example: One Pod, Two GPUs
#
# One pod, one container.
# Asking for 2 distinct GPUs.
#
# Expected: The container gets 2 different GPUs. Check with:
#   kubectl logs -n basic-multiple-requests pod0 -c ctr0 | grep GPU_DEVICE
# The container should have 2 GPU_DEVICE env vars with distinct GPU IDs.
#
# Driver requirements:
#   Profile: gpu
#   GPUs: 2
#
# Cluster requirements:
#   Kubernetes 1.34+

---
apiVersion: v1
kind: Namespace
metadata:
  name: basic-multiple-requests

---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  namespace: basic-multiple-requests
  name: multiple-gpus
spec:
  spec:
    devices:
      requests:
      - name: gpu-1
        exactly:
          deviceClassName: gpu.example.com
      - name: gpu-2
        exactly:
          deviceClassName: gpu.example.com

---
apiVersion: v1
kind: Pod
metadata:
  namespace: basic-multiple-requests
  name: pod0
  labels:
    app: pod
spec:
  containers:
  - name: ctr0
    image: ubuntu:22.04
    command: ["bash", "-c"]
    args: ["export; trap 'exit 0' TERM; sleep 9999 & wait"]
    resources:
      claims:
      - name: gpus
  resourceClaims:
  - name: gpus
    resourceClaimTemplateName: multiple-gpus
