# Example: Shared ResourceClaim Across Pods
#
# One shared claim providing access to a GPU.
# Two pods, each asking for access to the shared GPU.
#
# Uses a ResourceClaim (not a ResourceClaimTemplate), which is a standalone
# object that multiple pods can reference by name.
#
# Expected: Both pods see the same GPU. Check with:
#   kubectl logs -n basic-shared-claim-across-pods pod0 -c ctr0 | grep GPU_DEVICE
#   kubectl logs -n basic-shared-claim-across-pods pod1 -c ctr0 | grep GPU_DEVICE
# Both pods should show the same GPU ID.
#
# Driver requirements:
#   Profile: gpu
#   GPUs: 1
#
# Cluster requirements:
#   Kubernetes 1.34+

---
apiVersion: v1
kind: Namespace
metadata:
  name: basic-shared-claim-across-pods

---
apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  namespace: basic-shared-claim-across-pods
  name: single-gpu
spec:
    devices:
      requests:
      - name: gpu
        exactly:
          deviceClassName: gpu.example.com

---
apiVersion: v1
kind: Pod
metadata:
  namespace: basic-shared-claim-across-pods
  name: pod0
  labels:
    app: pod
spec:
  containers:
  - name: ctr0
    image: ubuntu:22.04
    command: ["bash", "-c"]
    args: ["export; trap 'exit 0' TERM; sleep 9999 & wait"]
    resources:
      claims:
      - name: shared-gpu
  resourceClaims:
  - name: shared-gpu
    resourceClaimName: single-gpu

---
apiVersion: v1
kind: Pod
metadata:
  namespace: basic-shared-claim-across-pods
  name: pod1
  labels:
    app: pod
spec:
  containers:
  - name: ctr0
    image: ubuntu:22.04
    command: ["bash", "-c"]
    args: ["export; trap 'exit 0' TERM; sleep 9999 & wait"]
    resources:
      claims:
      - name: shared-gpu
  resourceClaims:
  - name: shared-gpu
    resourceClaimName: single-gpu
