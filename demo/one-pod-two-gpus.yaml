# Example: One Pod, Two GPUs
#
# One pod, one container.
# Asking for 2 distinct GPUs.
#
# Expected: The container gets 2 different GPUs. Check with:
#   kubectl logs -n one-pod-two-gpus pod0 -c ctr0 | grep GPU_DEVICE
# The container should have 2 GPU_DEVICE env vars with distinct GPU IDs.
#
# Resources created:
#   - 1 ResourceClaimTemplate (multiple-gpus) with 2 requests
#   - 1 Pod (pod0) with 1 container
#
# GPUs required: 2

---
apiVersion: v1
kind: Namespace
metadata:
  name: one-pod-two-gpus

---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  namespace: one-pod-two-gpus
  name: multiple-gpus
spec:
  spec:
    devices:
      requests:
      - name: gpu-1
        exactly:
          deviceClassName: gpu.example.com
      - name: gpu-2
        exactly:
          deviceClassName: gpu.example.com

---
apiVersion: v1
kind: Pod
metadata:
  namespace: one-pod-two-gpus
  name: pod0
  labels:
    app: pod
spec:
  containers:
  - name: ctr0
    image: ubuntu:22.04
    command: ["bash", "-c"]
    args: ["export; trap 'exit 0' TERM; sleep 9999 & wait"]
    resources:
      claims:
      - name: gpus
  resourceClaims:
  - name: gpus
    resourceClaimTemplateName: multiple-gpus
