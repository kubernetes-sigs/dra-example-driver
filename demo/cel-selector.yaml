# Example: CEL Expression Selectors
#
# One pod, one container.
# Uses CEL expression selectors instead of matching on a DeviceClass.
# Selects a GPU with a specific model and at least 4Gi of memory.
#
# Expected: The container gets 1 GPU matching the CEL constraints. Check with:
#   kubectl logs -n cel-selector pod0 -c ctr0 | grep GPU_DEVICE
# The container should have 1 GPU_DEVICE env var.
#
# Resources created:
#   - 1 ResourceClaimTemplate (single-gpu-cel) with CEL selectors
#   - 1 Pod (pod0) with 1 container
#
# GPUs required: 1

---
apiVersion: v1
kind: Namespace
metadata:
  name: cel-selector

---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  namespace: cel-selector
  name: single-gpu-cel
spec:
  spec:
    devices:
      requests:
      - name: gpu
        exactly:
          deviceClassName: gpu.example.com
          selectors:
          - cel:
              expression: "device.attributes['gpu.example.com'].model == 'LATEST-GPU-MODEL'"
          - cel:
              expression: "device.capacity['gpu.example.com'].memory.compareTo(quantity('4Gi')) >= 0"

---
apiVersion: v1
kind: Pod
metadata:
  namespace: cel-selector
  name: pod0
  labels:
    app: pod
spec:
  containers:
  - name: ctr0
    image: ubuntu:22.04
    command: ["bash", "-c"]
    args: ["export; trap 'exit 0' TERM; sleep 9999 & wait"]
    resources:
      claims:
      - name: gpu
  resourceClaims:
  - name: gpu
    resourceClaimTemplateName: single-gpu-cel
