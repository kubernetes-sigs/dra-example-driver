# Example: DRA Admin Access
---
apiVersion: v1
kind: Namespace
metadata:
  name: admin-access
  labels:
    resource.kubernetes.io/admin-access: "true"
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  namespace: admin-access
  name: multiple-gpus-admin
spec:
  spec:
    devices:
      requests:
        - name: admin-gpu
          exactly:
            deviceClassName: gpu.example.com
            allocationMode: All
            adminAccess: true

---
apiVersion: v1
kind: Pod
metadata:
  namespace: admin-access
  name: pod0
spec:
  containers:
    - name: ctr0
      image: ubuntu:22.04
      command: ["bash", "-c"]
      args:
        - |
          export
          echo "=== DRA Admin Access Demo ==="
          echo "DRA Admin Access: $DRA_ADMIN_ACCESS"
          echo ""
          echo "GPU Environment Variables:"
          env | grep GPU_ | sort
          echo ""
          echo "=== Sleeping to allow inspection ==="
          trap 'exit 0' TERM
          sleep 9999 & wait
      resources:
        claims:
          - name: admin-gpus
  resourceClaims:
    - name: admin-gpus
      resourceClaimTemplateName: multiple-gpus-admin
