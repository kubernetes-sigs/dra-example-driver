# Example: DRA Partitionable Devices

---
apiVersion: v1
kind: Namespace
metadata:
  name: partitionable-devices
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  namespace: partitionable-devices
  name: gpu-partitions
spec:
  spec:
    devices:
      requests:
      - name: gpu-partition
        exactly:
          deviceClassName: gpu.example.com
          count: 2
---
apiVersion: v1
kind: Pod
metadata:
  namespace: partitionable-devices
  name: pod0
spec:
  restartPolicy: Never
  containers:
  - name: ctr0
    image: ubuntu:22.04
    command: ["bash", "-c"]
    args: ["export; trap 'exit 0' TERM; sleep 9999 & wait"]
    resources:
      claims:
      - name: gpu-partitions
  resourceClaims:
  - name: gpu-partitions
    resourceClaimTemplateName: gpu-partitions
