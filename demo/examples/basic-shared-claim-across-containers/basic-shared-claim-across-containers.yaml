# Example: Shared GPU Across Containers
---
apiVersion: v1
kind: Namespace
metadata:
  name: basic-shared-claim-across-containers

---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  namespace: basic-shared-claim-across-containers
  name: single-gpu
spec:
  spec:
    devices:
      requests:
        - name: gpu
          exactly:
            deviceClassName: gpu.example.com

---
apiVersion: v1
kind: Pod
metadata:
  namespace: basic-shared-claim-across-containers
  name: pod0
spec:
  containers:
    - name: ctr0
      image: ubuntu:22.04
      command: ["bash", "-c"]
      args: ["export; trap 'exit 0' TERM; sleep 9999 & wait"]
      resources:
        claims:
          - name: shared-gpu
    - name: ctr1
      image: ubuntu:22.04
      command: ["bash", "-c"]
      args: ["export; trap 'exit 0' TERM; sleep 9999 & wait"]
      resources:
        claims:
          - name: shared-gpu
  resourceClaims:
    - name: shared-gpu
      resourceClaimTemplateName: single-gpu
