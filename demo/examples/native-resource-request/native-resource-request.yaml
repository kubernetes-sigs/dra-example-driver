# Example: Native (Node-Allocatable) CPU Resources via DRA, with Sharing

---
apiVersion: v1
kind: Namespace
metadata:
  name: native-resource-request

---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  namespace: native-resource-request
  name: two-cpus
spec:
  spec:
    devices:
      requests:
      - name: cpu0
        exactly:
          deviceClassName: cpu.example.com
          capacity:
            requests:
              cpu.example.com/cpu: "1"
      - name: cpu1
        exactly:
          deviceClassName: cpu.example.com
          capacity:
            requests:
              cpu.example.com/cpu: "1"

---
apiVersion: v1
kind: Pod
metadata:
  namespace: native-resource-request
  name: pod0
  labels:
    app: pod
spec:
  containers:
  - name: ctr0
    image: ubuntu:22.04
    command: ["bash", "-c"]
    args: ["export; trap 'exit 0' TERM; sleep 9999 & wait"]
    resources:
      claims:
      - name: cpus
  resourceClaims:
  - name: cpus
    resourceClaimTemplateName: two-cpus
