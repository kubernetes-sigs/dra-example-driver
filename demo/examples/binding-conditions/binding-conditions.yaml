# Example: DRA Device Binding Conditions
---
apiVersion: v1
kind: Namespace
metadata:
  name: binding-conditions

---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  namespace: binding-conditions
  name: single-gpu
spec:
  spec:
    devices:
      requests:
      - name: gpu
        exactly:
          deviceClassName: gpu.example.com

---
apiVersion: v1
kind: Pod
metadata:
  namespace: binding-conditions
  name: pod0
spec:
  containers:
  - name: ctr0
    image: ubuntu:22.04
    command: ["bash", "-c"]
    args:
    - |
      export
      echo "=== DRA Device Binding Conditions Demo ==="
      echo ""
      echo "=== Sleeping to allow inspection ==="
      trap 'exit 0' TERM
      sleep 9999 & wait
    resources:
      claims:
      - name: gpu
  resourceClaims:
  - name: gpu
    resourceClaimTemplateName: single-gpu
