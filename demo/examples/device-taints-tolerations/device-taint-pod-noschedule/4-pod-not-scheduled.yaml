# Provided the DeviceTaintRule is created, this pod won't be scheduled.
kind: Pod
metadata:
  namespace: basic-resourceclaimtemplate
  name: pod-no-schedule
  labels:
    app: pod-no-schedule
spec:
  containers:
  - name: ctr0
    image: ubuntu:22.04
    command: ["bash", "-c"]
    args: ["export; trap 'exit 0' TERM; sleep 9999 & wait"]
    resources:
      claims:
      - name: gpu
  resourceClaims:
  - name: gpu
    resourceClaimTemplateName: single-gpu