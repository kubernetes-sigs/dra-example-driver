apiVersion: v1
kind: Pod
metadata:
  namespace: basic-resourceclaimtemplate
  name: pod-keeps-running
  labels:
    app: pod-keeps-running
spec:
  containers:
  - name: ctr0
    image: ubuntu:22.04
    command: ["bash", "-c"]
    args: ["export; trap 'exit 0' TERM; sleep 9999 & wait"]
    resources:
      claims:
      - name: gpu
  resourceClaims:
  - name: gpu
    resourceClaimTemplateName: single-gpu