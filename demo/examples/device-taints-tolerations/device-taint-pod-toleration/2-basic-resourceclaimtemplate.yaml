apiVersion: v1
kind: Namespace
metadata:
  name: basic-resourceclaimtemplate

---
# ResourceClaimTemplate without toleration
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  namespace: basic-resourceclaimtemplate
  name: single-gpu-without-toleration
spec:
  spec:
    devices:
      requests:
      - name: gpu
        exactly:
          deviceClassName: gpu.example.com
---
# ResourceClaimTemplate with toleration
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  namespace: basic-resourceclaimtemplate
  name: single-gpu-with-toleration
spec:
  spec:
    devices:
      requests:
      - name: gpu
        exactly:
          deviceClassName: gpu.example.com
          tolerations:
          - key: gpu.example.com/unhealthy
            operator: Equal
            value: "true"
            effect: NoExecute

---
# Pod using the resourceclaimtemplate without toleration
apiVersion: v1
kind: Pod
metadata:
  namespace: basic-resourceclaimtemplate
  name: pod-without-toleration
  labels:
    app: pod-without-toleration
spec:
  containers:
  - name: ctr0
    image: ubuntu:22.04
    command: ["bash", "-c"]
    args: ["export; trap 'exit 0' TERM; sleep 9999 & wait"]
    resources:
      claims:
      - name: gpu
  resourceClaims:
  - name: gpu
    resourceClaimTemplateName: single-gpu-without-toleration
 
---
# Pod using the resourceclaimtemplate with toleration
apiVersion: v1
kind: Pod
metadata:
  namespace: basic-resourceclaimtemplate
  name: pod-with-toleration
  labels:
    app: pod-with-toleration
spec:
  containers:
  - name: ctr0
    image: ubuntu:22.04
    command: ["bash", "-c"]
    args: ["export; trap 'exit 0' TERM; sleep 9999 & wait"]
    resources:
      claims:
      - name: gpu
  resourceClaims:
  - name: gpu
    resourceClaimTemplateName: single-gpu-with-toleration