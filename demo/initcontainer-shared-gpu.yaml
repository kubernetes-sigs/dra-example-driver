# Example: InitContainer Sharing a GPU with a Container
#
# One pod: one initContainer + one container.
# Each asking for shared access to a single GPU.
#
# Expected: Both the initContainer and container see the same GPU. Check with:
#   kubectl logs -n initcontainer-shared-gpu pod0 -c init0 | grep GPU_DEVICE
#   kubectl logs -n initcontainer-shared-gpu pod0 -c ctr0 | grep GPU_DEVICE
# Both should show the same GPU ID.
#
# Driver requirements:
#   Profile: gpu
#   GPUs: 1
#
# Cluster requirements:
#   Kubernetes 1.34+

---
apiVersion: v1
kind: Namespace
metadata:
  name: initcontainer-shared-gpu

---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  namespace: initcontainer-shared-gpu
  name: single-gpu
spec:
  spec:
    devices:
      requests:
      - name: gpu
        exactly:
          deviceClassName: gpu.example.com

---
apiVersion: v1
kind: Pod
metadata:
  namespace: initcontainer-shared-gpu
  name: pod0
spec:
  initContainers:
  - name: init0
    image: ubuntu:22.04
    command: ["bash", "-c"]
    args: ["export"]
    resources:
      claims:
      - name: shared-gpu
  containers:
  - name: ctr0
    image: ubuntu:22.04
    command: ["bash", "-c"]
    args: ["export; trap 'exit 0' TERM; sleep 9999 & wait"]
    resources:
      claims:
      - name: shared-gpu
  resourceClaims:
  - name: shared-gpu
    resourceClaimTemplateName: single-gpu
