# Example: Two Pods, One GPU Each
#
# Two pods, one container each.
# Each container asking for 1 distinct GPU.
#
# Expected: Each pod gets a different GPU. Check with:
#   kubectl logs -n two-pods-one-gpu-each pod0 -c ctr0 | grep GPU_DEVICE
#   kubectl logs -n two-pods-one-gpu-each pod1 -c ctr0 | grep GPU_DEVICE
# Each container should have 1 GPU_DEVICE env var with a distinct GPU ID.
#
# Resources created:
#   - 1 ResourceClaimTemplate (single-gpu)
#   - 2 Pods (pod0, pod1), each with 1 container
#
# GPUs required: 2

---
apiVersion: v1
kind: Namespace
metadata:
  name: two-pods-one-gpu-each

---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  namespace: two-pods-one-gpu-each
  name: single-gpu
spec:
  spec:
    devices:
      requests:
      - name: gpu
        exactly:
          deviceClassName: gpu.example.com

---
apiVersion: v1
kind: Pod
metadata:
  namespace: two-pods-one-gpu-each
  name: pod0
  labels:
    app: pod
spec:
  containers:
  - name: ctr0
    image: ubuntu:22.04
    command: ["bash", "-c"]
    args: ["export; trap 'exit 0' TERM; sleep 9999 & wait"]
    resources:
      claims:
      - name: gpu
  resourceClaims:
  - name: gpu
    resourceClaimTemplateName: single-gpu

---
apiVersion: v1
kind: Pod
metadata:
  namespace: two-pods-one-gpu-each
  name: pod1
  labels:
    app: pod
spec:
  containers:
  - name: ctr0
    image: ubuntu:22.04
    command: ["bash", "-c"]
    args: ["export; trap 'exit 0' TERM; sleep 9999 & wait"]
    resources:
      claims:
      - name: gpu
  resourceClaims:
  - name: gpu
    resourceClaimTemplateName: single-gpu
