# Example: PodGroup ResourceClaimTemplate
#
# Two gang-scheduled PodGroups. All of the Pods in each PodGroup share the same
# GPU. Each PodGroup receives a separate GPU:
#   kubectl logs -n podgroup-resourceclaimtemplate --tail=-1 -l app=group-1 | grep GPU_DEVICE
#   kubectl logs -n podgroup-resourceclaimtemplate --tail=-1 -l app=group-2 | grep GPU_DEVICE
#
# Driver Requirements:
#   Profile: gpu
#   GPUs: 2
#
# Cluster Requirements:
#   Kubernetes 1.36+
#   scheduling.k8s.io/v1alpha2 API enabled
#   GenericWorkload, GangScheduling, and DRAWorkloadResourceClaims features enabled

---
apiVersion: v1
kind: Namespace
metadata:
  name: podgroup-resourceclaimtemplate
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: one-gpu
  namespace: podgroup-resourceclaimtemplate
spec:
  spec:
    devices:
      requests:
      - name: gpu
        exactly:
          deviceClassName: gpu.example.com
---
apiVersion: scheduling.k8s.io/v1alpha2
kind: PodGroup
metadata:
  name: group-1
  namespace: podgroup-resourceclaimtemplate
spec:
  schedulingPolicy:
    gang:
      minCount: 2
  resourceClaims:
  - name: gpu
    resourceClaimTemplateName: one-gpu
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: podgroup-resourceclaimtemplate
  name: group-1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: group-1
  template:
    metadata:
      labels:
        app: group-1
    spec:
      containers:
      - name: ctr0
        image: ubuntu:22.04
        command: ["bash", "-c"]
        args: ["export; trap 'exit 0' TERM; sleep 9999 & wait"]
        resources:
          claims:
          - name: gpu
      schedulingGroup:
        podGroupName: group-1
      resourceClaims:
      - name: gpu
        resourceClaimTemplateName: one-gpu
---
apiVersion: scheduling.k8s.io/v1alpha2
kind: PodGroup
metadata:
  name: group-2
  namespace: podgroup-resourceclaimtemplate
spec:
  schedulingPolicy:
    gang:
      minCount: 2
  resourceClaims:
  - name: gpu
    resourceClaimTemplateName: one-gpu
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: podgroup-resourceclaimtemplate
  name: group-2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: group-2
  template:
    metadata:
      labels:
        app: group-2
    spec:
      containers:
      - name: ctr0
        image: ubuntu:22.04
        command: ["bash", "-c"]
        args: ["export; trap 'exit 0' TERM; sleep 9999 & wait"]
        resources:
          claims:
          - name: gpu
      schedulingGroup:
        podGroupName: group-2
      resourceClaims:
      - name: gpu
        resourceClaimTemplateName: one-gpu
