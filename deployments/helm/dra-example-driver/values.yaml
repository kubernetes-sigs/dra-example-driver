# Default values for draexample--driver.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""
selectorLabelsOverride: {}

allowDefaultNamespace: false

# deviceProfile describes the overall shape of the devices managed by the
# driver. The default is "gpu" so the existing demo and tests keep working
# without any changes; pick a different profile only when you specifically
# want to use a different device profile.
#
# Available profiles:
#   - "gpu":      (default) Node-local mock GPUs configurable through
#                 opaque config. This is what the README quickstart
#                 and the demo/gpu-test*.yaml fixtures exercise.
#   - "vfio-gpu": Real PCI devices already bound to the vfio-pci
#                 kernel driver, discovered by walking
#                 /sys/bus/pci/drivers/vfio-pci. Each such device is
#                 advertised as a DRA device with attributes for the
#                 PCI bus ID, vendor/device/class and IOMMU group
#                 (vendor/device/class are sourced from
#                 /sys/bus/pci/devices/<BDF>/).
#
# Examples:
#   helm install ... dra-example-driver deployments/helm/dra-example-driver
#   helm install ... --set deviceProfile=vfio-gpu dra-example-driver-vfio-gpu deployments/helm/dra-example-driver
#
# The driverName (and therefore the DeviceClass name) defaults to
# "<deviceProfile>.example.com", so the profiles can coexist in the
# same cluster as separate driver instances.
deviceProfile: "gpu"

# driverName uniquely identifies the driver within the cluster. When empty, its
# value is derived from the deviceProfile.
driverName: ""

# deviceClass configures the DeviceClass the driver creates for its devices.
deviceClass:
  # extendedResourceName maps this DeviceClass to a classic extended resource
  # name (KEP-5004), so pods can request a device via `resources.limits` (e.g.
  # `example.com/gpu: 1`) instead of via a ResourceClaim. Defaults to "" so a
  # fresh install does not silently claim ownership of a name that may collide
  # with a real driver. The implicit form
  # `deviceclass.resource.kubernetes.io/<deviceClassName>` is always available.
  extendedResourceName: ""

# add allocated device attributes (e.g. model, uuid, driverVersion)
# into ResourceClaim.status.devices[].data via server-side apply.
gpuDeviceStatus: false

imagePullSecrets: []
image:
  repository: registry.k8s.io/dra-example-driver/dra-example-driver
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

kubeletPlugin:
  # numDevices describes how many mock devices to advertise on each
  # node. Honored only by the "gpu" profile - the "vfio-gpu" profile
  # discovers real devices from /sys/bus/pci/drivers/vfio-pci and
  # /sys/bus/pci/devices (fixed paths in the driver).
  numDevices: 8
  # gpuPartitions sets the number of partitions per GPU. When set to a value
  # greater than 0, GPUs are exposed with shared counters allowing flexible
  # partitioning (DRAPartitionableDevices feature). 0 disables partitioning.
  gpuPartitions: 0
  priorityClassName: "system-node-critical"
  updateStrategy:
    type: RollingUpdate
    # for seamless rolling updates, maxSurge can be greater than 0.
    # See: https://pkg.go.dev/k8s.io/dynamic-resource-allocation/kubeletplugin#RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  podAnnotations: {}
  podSecurityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  kubeletRegistrarDirectoryPath: /var/lib/kubelet/plugins_registry
  kubeletPluginsDirectoryPath: /var/lib/kubelet/plugins
  # bindingConditions enables or disables binding conditions processing in the DRA driver
  bindingConditions: false
  enableDeviceMetadata: false
  containers:
    init:
      securityContext: {}
      resources: {}
    plugin:
      securityContext:
        privileged: true
      resources: {}
      # Port running a gRPC health service checked by a livenessProbe.
      # Set to a negative value to disable the service and the probe.
      healthcheckPort: 51515

controller:
  # plugins is a list of plugins to enable in the controller.
  # When non-empty, the controller Deployment is created.
  # Available plugins: ["BindingConditions"]
  plugins: []

webhook:
  enabled: false
  servicePort: 443
  containerPort: 443
  priorityClassName: "system-cluster-critical"
  strategy:
    type: RollingUpdate
  podAnnotations: {}
  podSecurityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  containers:
    webhook:
      securityContext:
        privileged: false
      resources: {}
  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""

resourceQuota:
  enabled: false
  pods: 10
  scopeSelector:
    matchExpressions:
    - operator: In
      scopeName: PriorityClass
      values:
      - system-node-critical
      - system-cluster-critical
